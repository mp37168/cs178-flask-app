<!DOCTYPE html>
<html>
<head>
    <title>Movies</title>

    <!-- Bootstrap CSS -->
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f8f9fa;
        }
    </style>
</head>

<body>

<div class="container mt-5">

    <h2 class="mb-4">🎬 Movies</h2>

    <!-- Action Buttons -->
    <a href="/add-movie" class="btn btn-primary mb-3">➕ Add Movie</a>

    <table class="table table-striped table-hover table-bordered">

        <thead class="thead-dark">
            <tr>
                <th>Title</th>
                <th>Year</th>
                <th>Actions</th>
            </tr>
        </thead>

        <tbody>
            {% for m in movies %}
            <tr>
                <td>{{ m['title'] }}</td>
                <td>{{ m['release_date'] }}</td>

                <td>

                    <a href="/update-movie/{{ m['movie_id'] }}"
                       class="btn btn-sm btn-primary">
                        Edit
                    </a>

                    <a href="/delete-movie/{{ m['movie_id'] }}"
                       class="btn btn-sm btn-danger">
                        Delete
                    </a>

                </td>
            </tr>
            {% endfor %}
        </tbody>

    </table>

</div>

</body>
</html>

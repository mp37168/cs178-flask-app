<h1> Movies </h1>

<table class="table">
    <thead>
        <tr>
            <th>Title</th>
            <th>Year</th>
        </tr>
    </thead>
    <tbody>
        {% for m in movies %} 
        <tr>
            <td>{{ m.title }}</td>
            <td>{{ m.release_date }}</td>
        </tr>
        {% endfor %}
    </tbody>

<!DOCTYPE html>
<html>
<head>
    <title>Add Movie</title>

    <!-- Bootstrap CSS -->
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #bdb9d7;
        }
    </style>
</head>

<body>

<div class="container mt-5">

    <h2 class="mb-4">🎬 Add Movie</h2>

    <form method="POST">

        <div class="form-group">
            <label>Title</label>
            <input name="title" class="form-control" placeholder="Enter movie title">
        </div>

        <div class="form-group">
            <label>Release Date</label>
            <input name="release_date" class="form-control" placeholder="YYYY-MM-DD">
        </div>

        <button type="submit" class="btn btn-success">
            ➕ Add Movie
        </button>

        <a href="/display-movies" class="btn btn-secondary">
            Cancel
        </a>

    </form>

</div>

</body>
</html>

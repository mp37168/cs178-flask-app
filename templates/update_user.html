<!doctype html>
<html lang="en">
<head>
    <title>Update User</title>

    <!-- Bootstrap CSS -->
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #caccf4;
        }
    </style>
</head>

<body>

<div class="container mt-5">

    <h2 class="mb-4">👤 Update User</h2>

    <form method="post">

        <div class="form-group">
            <label>Name</label>
            <input type="text"
                   name="name"
                   value="{{ user.name }}"
                   class="form-control"
                   required>
        </div>

        <div class="form-group">
            <label>Favorite Genre</label>
            <input type="text"
                   name="genre"
                   value="{{ user.genre }}"
                   class="form-control"
                   required>
        </div>

        <button type="submit" class="btn btn-primary">
            ✏️ Update User
        </button>

        <a href="{{ url_for('display_users') }}" class="btn btn-secondary">
            Cancel
        </a>

    </form>

</div>

</body>
</html>
